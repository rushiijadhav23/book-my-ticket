<div class="max-w-6xl w-full bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-slate-700/50">

  <!-- HEADER -->
  <div class="text-center mb-8">
    <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-4">
      🎬 ChaiCode Cinema
    </h1>
    <p class="text-slate-400">Login → Select Movie → Book Seats</p>
  </div>

  <!-- AUTH SECTION -->
  <div class="text-center mb-6">
    <input id="email" placeholder="Email" class="p-2 m-2 rounded text-black" />
    <input id="password" type="password" placeholder="Password" class="p-2 m-2 rounded text-black" />
    <br />
    <button onclick="register()" class="bg-blue-500 px-4 py-2 rounded m-2">Register</button>
    <button onclick="login()" class="bg-green-500 px-4 py-2 rounded m-2">Login</button>
  </div>

  <!-- MOVIES -->
  <div id="movies" class="text-center mb-8"></div>

  <!-- LEGEND -->
  <div class="flex justify-center mb-8">
    <div class="bg-slate-900/50 rounded-full px-6 py-3 border border-slate-700 flex gap-8 items-center">
      <div class="flex items-center gap-3">
        <div class="w-4 h-4 rounded-full bg-emerald-500"></div>
        <span class="text-slate-300">Available</span>
      </div>
      <div class="flex items-center gap-3">
        <div class="w-4 h-4 rounded-full bg-rose-500/40"></div>
        <span class="text-slate-300">Booked</span>
      </div>
    </div>
  </div>

  <!-- SEATS -->
  <div class="flex justify-center">
    <table id="tbl" class="border-separate border-spacing-4"></table>
  </div>

</div>

<!-- MAIN JS (ENTRY POINT) -->
<script type="module" src="./js/main.js"></script>
